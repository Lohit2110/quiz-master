<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Quiz Diagnostic Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        h2 {
            color: #667eea;
            margin-top: 30px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 5px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .quiz-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .quiz-card.published {
            border-left: 5px solid #28a745;
        }
        .quiz-card.unpublished {
            border-left: 5px solid #ffc107;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .badge.published {
            background: #28a745;
            color: white;
        }
        .badge.unpublished {
            background: #ffc107;
            color: #333;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 14px;
        }
        .count-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .count-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .count-card .number {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        .count-card .label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Firebase Quiz Diagnostic Tool</h1>
        <p>This tool helps diagnose why quizzes in Firebase are not showing on your website.</p>

        <div id="connectionStatus"></div>

        <div style="margin: 20px 0;">
            <button onclick="runFullDiagnostic()">🔬 Run Full Diagnostic</button>
            <button onclick="checkFirebaseConnection()">🔗 Check Firebase Connection</button>
            <button onclick="listAllQuizzes()">📚 List All Quizzes</button>
            <button onclick="checkPublishedQuizzes()">✅ Check Published Quizzes</button>
            <button onclick="checkLocalStorage()">💾 Check LocalStorage</button>
            <button onclick="fixQuizzes()">🔧 Fix Quiz Fields</button>
            <button onclick="clearCache()">🗑️ Clear Cache</button>
        </div>

        <div id="results"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, query, where, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBRp2rlr4WoPvq-Ut6Vs4cJAoU56qM5Y40",
            authDomain: "quiz-web-app-109af.firebaseapp.com",
            projectId: "quiz-web-app-109af",
            storageBucket: "quiz-web-app-109af.firebasestorage.app",
            messagingSenderId: "482157581997",
            appId: "1:482157581997:web:03ae71b62000dfa0ccd824"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.where = where;
        window.doc = doc;
        window.updateDoc = updateDoc;

        // Helper functions
        function showStatus(message, type = 'info') {
            const div = document.getElementById('connectionStatus');
            div.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function showResults(html) {
            document.getElementById('results').innerHTML = html;
        }

        window.checkFirebaseConnection = async function() {
            showStatus('🔄 Checking Firebase connection...', 'info');
            try {
                const testQuery = await getDocs(collection(db, 'quizzes'));
                showStatus(`✅ Connected to Firebase! Found ${testQuery.size} quiz documents.`, 'success');
            } catch (error) {
                showStatus(`❌ Firebase connection error: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.listAllQuizzes = async function() {
            showStatus('📥 Fetching all quizzes from Firebase...', 'info');
            try {
                const quizzesRef = collection(db, 'quizzes');
                const snapshot = await getDocs(quizzesRef);
                
                let html = `<h2>All Quizzes in Firebase (${snapshot.size} total)</h2>`;
                
                if (snapshot.empty) {
                    html += '<div class="status warning">⚠️ No quizzes found in Firebase!</div>';
                } else {
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const isPublished = data.published === true || data.isPublished === true;
                        const cardClass = isPublished ? 'published' : 'unpublished';
                        const badgeClass = isPublished ? 'published' : 'unpublished';
                        const badgeText = isPublished ? 'PUBLISHED' : 'UNPUBLISHED';
                        
                        html += `
                            <div class="quiz-card ${cardClass}">
                                <strong>${data.title || 'Untitled Quiz'}</strong>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                                <div style="margin-top: 10px; font-size: 14px; color: #666;">
                                    📋 ID: ${doc.id}<br>
                                    📝 Questions: ${data.questions?.length || 0}<br>
                                    📅 Created: ${data.createdAt ? new Date(data.createdAt).toLocaleString() : 'Unknown'}<br>
                                    ✅ published field: ${data.published !== undefined ? data.published : 'MISSING'}<br>
                                    ✅ isPublished field: ${data.isPublished !== undefined ? data.isPublished : 'MISSING'}<br>
                                    📢 publishedAt: ${data.publishedAt ? 'Yes' : 'No'}<br>
                                    🗂️ Uses subcollections: ${data.usesSubcollections ? 'Yes' : 'No'}
                                </div>
                            </div>
                        `;
                    });
                }
                
                showResults(html);
                showStatus(`✅ Found ${snapshot.size} quizzes`, 'success');
            } catch (error) {
                showStatus(`❌ Error fetching quizzes: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.checkPublishedQuizzes = async function() {
            showStatus('🔍 Checking published quizzes...', 'info');
            try {
                const q = query(collection(db, 'quizzes'), where('published', '==', true));
                const snapshot = await getDocs(q);
                
                let html = `<h2>Published Quizzes (${snapshot.size} found)</h2>`;
                
                if (snapshot.empty) {
                    html += '<div class="status warning">⚠️ No published quizzes found! This is why students can\'t see quizzes.</div>';
                    html += '<div class="status info">💡 Solution: Use the "Fix Quiz Fields" button to update all quizzes to published status.</div>';
                } else {
                    html += '<div class="status success">✅ These quizzes should be visible to students:</div>';
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        html += `
                            <div class="quiz-card published">
                                <strong>${data.title || 'Untitled Quiz'}</strong>
                                <span class="badge published">PUBLISHED</span>
                            </div>
                        `;
                    });
                }
                
                showResults(html);
                showStatus(`Found ${snapshot.size} published quizzes`, snapshot.size > 0 ? 'success' : 'warning');
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.checkLocalStorage = function() {
            const savedQuizzes = localStorage.getItem('quiz_master_saved_quizzes');
            const quizzes = savedQuizzes ? JSON.parse(savedQuizzes) : [];
            
            let html = `<h2>LocalStorage Quizzes (${quizzes.length} found)</h2>`;
            
            if (quizzes.length === 0) {
                html += '<div class="status warning">⚠️ No quizzes in localStorage!</div>';
            } else {
                quizzes.forEach((quiz, index) => {
                    html += `
                        <div class="quiz-card">
                            <strong>${quiz.title || 'Untitled Quiz'}</strong>
                            <div style="margin-top: 10px; font-size: 14px; color: #666;">
                                📋 ID: ${quiz.id}<br>
                                📝 Questions: ${quiz.questions?.length || 0}
                            </div>
                        </div>
                    `;
                });
            }
            
            showResults(html);
        };

        window.fixQuizzes = async function() {
            if (!confirm('This will update ALL quizzes in Firebase to be published. Continue?')) {
                return;
            }
            
            showStatus('🔧 Fixing quiz fields...', 'info');
            try {
                const quizzesRef = collection(db, 'quizzes');
                const snapshot = await getDocs(quizzesRef);
                
                let fixed = 0;
                const promises = [];
                
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const updates = {};
                    
                    // Ensure 'published' field exists and is true
                    if (data.published !== true) {
                        updates.published = true;
                        updates.publishedAt = new Date();
                        fixed++;
                    }
                    
                    if (Object.keys(updates).length > 0) {
                        const docRef = doc(db, 'quizzes', docSnap.id);
                        promises.push(updateDoc(docRef, updates));
                    }
                });
                
                await Promise.all(promises);
                
                showStatus(`✅ Fixed ${fixed} quizzes! Refresh your app to see changes.`, 'success');
                await listAllQuizzes();
            } catch (error) {
                showStatus(`❌ Error fixing quizzes: ${error.message}`, 'error');
                console.error(error);
            }
        };

        window.clearCache = function() {
            if (confirm('This will clear all local quiz data. Continue?')) {
                localStorage.removeItem('quiz_master_saved_quizzes');
                localStorage.removeItem('quiz_master_global_quizzes');
                localStorage.removeItem('quiz_master_last_update');
                showStatus('✅ Cache cleared! Reload the app to sync from Firebase.', 'success');
            }
        };

        window.runFullDiagnostic = async function() {
            showStatus('🔬 Running full diagnostic...', 'info');
            
            try {
                // Step 1: Check connection
                const allQuizzes = await getDocs(collection(db, 'quizzes'));
                const publishedQuery = query(collection(db, 'quizzes'), where('published', '==', true));
                const publishedQuizzes = await getDocs(publishedQuery);
                
                // Step 2: Check localStorage
                const savedQuizzes = localStorage.getItem('quiz_master_saved_quizzes');
                const localQuizzes = savedQuizzes ? JSON.parse(savedQuizzes) : [];
                
                // Step 3: Generate report
                let html = `
                    <h2>📊 Diagnostic Report</h2>
                    <div class="count-grid">
                        <div class="count-card">
                            <div class="label">Total in Firebase</div>
                            <div class="number">${allQuizzes.size}</div>
                        </div>
                        <div class="count-card">
                            <div class="label">Published</div>
                            <div class="number">${publishedQuizzes.size}</div>
                        </div>
                        <div class="count-card">
                            <div class="label">In LocalStorage</div>
                            <div class="number">${localQuizzes.length}</div>
                        </div>
                    </div>
                `;
                
                // Diagnosis
                if (allQuizzes.size === 0) {
                    html += '<div class="status error">❌ PROBLEM: No quizzes in Firebase at all!</div>';
                } else if (publishedQuizzes.size === 0) {
                    html += '<div class="status error">❌ PROBLEM: Quizzes exist but none are published!</div>';
                    html += '<div class="status info">💡 SOLUTION: Click "Fix Quiz Fields" to publish all quizzes.</div>';
                } else if (publishedQuizzes.size < allQuizzes.size) {
                    html += `<div class="status warning">⚠️ WARNING: Only ${publishedQuizzes.size} out of ${allQuizzes.size} quizzes are published.</div>`;
                } else {
                    html += '<div class="status success">✅ All quizzes are published!</div>';
                }
                
                if (localQuizzes.length === 0 && publishedQuizzes.size > 0) {
                    html += '<div class="status warning">⚠️ WARNING: LocalStorage is empty but Firebase has quizzes. Click "Clear Cache" then reload app.</div>';
                } else if (localQuizzes.length !== publishedQuizzes.size) {
                    html += `<div class="status warning">⚠️ MISMATCH: LocalStorage has ${localQuizzes.length} quizzes but Firebase has ${publishedQuizzes.size}.</div>`;
                } else {
                    html += '<div class="status success">✅ LocalStorage matches Firebase!</div>';
                }
                
                showResults(html);
                showStatus('✅ Diagnostic complete!', 'success');
            } catch (error) {
                showStatus(`❌ Diagnostic failed: ${error.message}`, 'error');
                console.error(error);
            }
        };

        // Auto-check connection on load
        checkFirebaseConnection();
    </script>
</body>
</html>
