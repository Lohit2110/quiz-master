<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gradient Background Circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- Book/Quiz Symbol -->
  <g transform="translate(100, 100)">
    <!-- Book pages -->
    <rect x="-40" y="-35" width="80" height="70" rx="4" fill="white" opacity="0.95"/>
    
    <!-- Book spine -->
    <rect x="-42" y="-35" width="6" height="70" rx="2" fill="white" opacity="0.8"/>
    
    <!-- Question mark -->
    <g transform="translate(0, -5)">
      <path d="M -5 -15 Q -5 -25 0 -25 Q 5 -25 5 -20 Q 5 -15 0 -12 L 0 -5" 
            stroke="#4F46E5" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="3" r="3" fill="#4F46E5"/>
    </g>
    
    <!-- Quiz lines decoration -->
    <line x1="-25" y1="15" x2="25" y2="15" stroke="#4F46E5" stroke-width="2" opacity="0.3"/>
    <line x1="-25" y1="22" x2="15" y2="22" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Sparkle effects -->
  <circle cx="35" cy="45" r="3" fill="white" opacity="0.8"/>
  <circle cx="165" cy="155" r="4" fill="white" opacity="0.7"/>
  <circle cx="155" cy="50" r="2.5" fill="white" opacity="0.9"/>
</svg>
